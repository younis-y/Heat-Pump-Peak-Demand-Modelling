# =============================================================================
# Heat Pump Peak Demand Modelling — Simulation Configuration  (v3)
# =============================================================================
# All hyperparameters and scenario definitions for the full factorial design.
# No magic numbers in code — everything is read from here.
#
# v3 changes:
#   - Real EPW weather data (London Gatwick TMYx 2009-2023) replaces synthetic
#   - COP curve calibrated to EST/DECC Renewable Heat Premium Payment field
#     trial data (2013) — 700+ UK ASHP installations
#   - Fabric U-values referenced to CIBSE Guide A (2015) & English Housing
#     Survey 2019 for pre-/post-retrofit archetypes
#   - Occupant archetypes informed by ONS Time Use Survey 2015 & Carbon Trust
#     Household Energy Study heating patterns
#   - HDD benchmark methodology follows Staffell & Green (2014)
#     "Domestic heating by heat pumps: technology, economics and emissions"
#
# Data sources:
#   Weather:  climate.onebuilding.org — TMYx EPW, Gatwick (ASHRAE/WMO)
#   COP:     EST/DECC RHPP field trial (2013), Staffell et al. (2012)
#   Fabric:  CIBSE Guide A Table 3.49, EHS 2019 Table DA6101
#   Behaviour: ONS Time Use Survey 2015, Carbon Trust (2012)
#   HDD ref:  Staffell & Green (2014), National Grid FES 2023
# =============================================================================

random_seed: 42

# ---------------------------------------------------------------------------
# Time resolution
# ---------------------------------------------------------------------------
timesteps: 96            # 24 hours at 15-min resolution
dt_minutes: 15           # output resolution
dt_internal_seconds: 60  # internal ODE solver step (1 minute)

# ---------------------------------------------------------------------------
# Monte Carlo replication
# ---------------------------------------------------------------------------
replicates: 10                   # runs per cell (total = 24 × 10 = 240)
schedule_jitter_minutes: 15.0    # ±15 min random shift on schedule edges
gains_noise_fraction: 0.3        # ±30 % noise on internal gains per timestep

# ---------------------------------------------------------------------------
# EPW weather data
# ---------------------------------------------------------------------------
epw_file: "data/raw/GBR_ENG_London-Gatwick.AP.037760_TMYx.2009-2023.epw"

# ---------------------------------------------------------------------------
# Building geometry (fixed: 1970s UK semi-detached)
# Source: English Housing Survey 2019 — median semi-detached dimensions
# ---------------------------------------------------------------------------
building:
  type: "1970s UK semi-detached"
  floor_area_m2: 85
  volume_m3: 204
  thermal_mass_kJ_per_m2K: 165   # medium thermal mass (CIBSE Guide A Table 6.5)
  wall_area_m2: 100               # net external wall area (excl. windows)
  roof_area_m2: 42.5              # half of floor area (semi-detached)
  floor_area_ground_m2: 42.5      # ground floor contact area
  window_area_m2: 16              # ~19 % of floor area, typical UK
  storey_height_m: 2.4

# ---------------------------------------------------------------------------
# Fabric conditions
# Sources:
#   F1 (unimproved): CIBSE Guide A 2015 Table 3.49 — 1970s solid wall
#   F2 (retrofitted): CIBSE Guide A 2015 + EHS 2019 retrofit standards
# ---------------------------------------------------------------------------
fabric:
  F1:
    name: "1970s unimproved"
    U_wall: 1.7       # W/m²K — solid brick, no insulation (CIBSE Guide A)
    U_roof: 2.3       # uninsulated pitched roof
    U_floor: 0.7      # suspended timber, no insulation
    U_window: 5.6     # single glazed, metal frame
    ACH: 0.8          # air changes per hour — draughty 1970s dwelling
  F2:
    name: "Post-retrofit"
    U_wall: 0.3       # external wall insulation to Part L standard
    U_roof: 0.15      # 270mm loft insulation
    U_floor: 0.25     # insulated suspended floor
    U_window: 1.6     # double glazed, low-e
    ACH: 0.4          # improved air-tightness post-retrofit

# ---------------------------------------------------------------------------
# Behaviour archetypes
# Sources:
#   Schedule patterns: ONS Time Use Survey 2015 (heating-on hours),
#   Carbon Trust Household Energy Study (2012) — 4 dominant heating profiles
#   Setpoints: BREDEM-12 / SAP 2012 assumed 21°C living, 18°C rest
# ---------------------------------------------------------------------------
archetypes:
  B1:
    name: "Early Riser"
    setpoint_C: 20.0
    setback_C: 15.0
    schedule_on:
      - [6.0, 8.0]
      - [17.0, 22.0]
  B2:
    name: "Home All Day"
    setpoint_C: 21.0
    setback_C: 15.0
    schedule_on:
      - [7.0, 22.0]
  B3:
    name: "Late Returner"
    setpoint_C: 19.0
    setback_C: 15.0
    schedule_on:
      - [7.0, 8.5]
      - [19.0, 23.0]
  B4:
    name: "Intermittent"
    setpoint_C: 20.0
    setback_C: 15.0
    schedule_on:
      - [7.0, 8.0]
      - [12.0, 13.0]
      - [17.0, 18.5]
      - [20.0, 22.0]
    variable_setpoint: true
    setpoint_min_C: 18.0
    setpoint_max_C: 22.0

# ---------------------------------------------------------------------------
# Weather scenarios — real EPW days from London Gatwick TMYx
# Selected from ASHRAE typical/extreme period analysis:
#   W1: Mild cold day (spring typical week)
#   W2: Design cold day (winter extreme week start — 99% design temp = -4°C)
#   W3: Extreme cold day (winter extreme week — Beast from the East proxy)
# ---------------------------------------------------------------------------
weather:
  W1:
    name: "Mild Cold"
    epw_month: 3
    epw_day: 19
    # Real profile: T_mean ≈ 4.0°C, range [-3.0, 11.0]
  W2:
    name: "Design Cold"
    epw_month: 2
    epw_day: 10
    # Real profile: T_mean ≈ -0.7°C, range [-4.0, 0.5]
  W3:
    name: "Extreme Cold"
    epw_month: 2
    epw_day: 11
    # Real profile: T_mean ≈ -2.5°C, range [-5.7, -0.5]

# ---------------------------------------------------------------------------
# Heat pump parameters
# Source: EST/DECC Renewable Heat Premium Payment field trial (2013)
#   - COP regression from 700+ monitored UK ASHP installations
#   - Defrost penalty from Staffell et al. (2012) "A review of domestic
#     heat pumps", Energy & Environmental Science
#   - Capacity derating from manufacturer datasheets (Mitsubishi Ecodan,
#     Daikin Altherma) averaged across 8-12 kW range
# ---------------------------------------------------------------------------
heat_pump:
  rated_thermal_capacity_kW: 12.0
  capacity_design_temp_C: 7.0    # outdoor temp at which rated capacity applies
  capacity_derating_per_K: 0.025 # 2.5 % thermal loss per K below design temp
  # COP model: COP = 3.5 + 0.12 * T_out
  # Calibrated to EST RHPP trial median: COP ≈ 2.7 at 0°C, 3.5 at 7°C
  cop_intercept: 3.5
  cop_slope: 0.12
  cop_max: 4.5
  cop_min: 1.5
  min_runtime_minutes: 10
  defrost_temp_threshold_C: -2.0
  defrost_efficiency_penalty: 0.15   # 15% COP loss below -2°C (Staffell 2012)
  # Auxiliary electric resistance heater (direct electric, COP=1)
  aux_capacity_kW: 3.0           # 3 kW backup for recovery loads
  aux_deficit_threshold_C: 3.0   # activates when T_in deficit > 3°C
  # Frost protection
  frost_protection_C: 12.0       # HP turns on if T_in drops below this

# ---------------------------------------------------------------------------
# Internal gains
# Source: CIBSE Guide A Table 6.3 — typical UK dwelling
# ---------------------------------------------------------------------------
internal_gains:
  base_W: 200
  occupancy_pulse_W: 500

# ---------------------------------------------------------------------------
# Thermostat controller
# ---------------------------------------------------------------------------
controller:
  deadband_C: 0.5

# ---------------------------------------------------------------------------
# HDD benchmark
# Source: Staffell & Green (2014) methodology — base temp 15.5°C
# National Grid Future Energy Scenarios 2023 for context
# ---------------------------------------------------------------------------
hdd:
  base_temp_C: 15.5

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
